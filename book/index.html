<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشر الیما | گالری کتاب‌ها</title>
    
    <link rel="icon" href="../icon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <script src="../database.js" defer></script>
    <script src="../layout.js" defer></script>
    <script src="../script.js" defer></script>
    <script>
        if (localStorage.getItem('elima-theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>
</head>
<body>
    <script>
        if (localStorage.getItem('elima-theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
    </script>
    <div class="site-wrapper">
        <site-header></site-header>

        <main class="gallery-page">
            <section class="gallery-header">
                <h1>ویترین <span>کتاب‌ها</span></h1>
                <p>گشتی در میان آثار منتشر شده</p>
                <div class="filter-container">
                    <button class="filter-btn active" data-filter="all">همه آثار</button>
                    <button class="filter-btn" data-filter="literature">ادبیات و شعر</button>
                    <button class="filter-btn" data-filter="history">تاریخی</button>
                </div>
            </section>

            <section class="compact-book-gallery"></section>
        </main>

       <site-footer></site-footer>

        <button class="scroll-top" id="scrollTopBtn" aria-label="برو به بالا">▲</button>
    </div>
</body>
</html>
